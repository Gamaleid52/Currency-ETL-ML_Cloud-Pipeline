name: Automated Currency ETL & ML Pipeline

# 1. تحديد مواعيد التشغيل التلقائي
on:
  schedule:
    - cron: '0 0 * * *' # هيشتغل لوحده أوتوماتيك كل يوم الساعة 12 بالليل بتوقيت جرينتش
  workflow_dispatch: # زرار إضافي عشان لو حبيت تشغله بإيدك في أي وقت للتجربة

jobs:
  run-pipeline:
    runs-on: ubuntu-latest # سيرفر لينكس مجاني من جيت هاب

    steps:
    # الخطوة الأولى: تحميل الكود من الريبو
    - name: Checkout Repository Code
      uses: actions/checkout@v3

    # الخطوة الثانية: تجهيز البيئة وتثبيت بايثون
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # الخطوة الثالثة: تثبيت المكتبات من ملف requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # الخطوة الرابعة: تشغيل سكريبت سحب البيانات التاريخية والجديدة لـ Supabase
    - name: Run Data Extraction (ETL)
      run: python extract_historical_data.py

    # الخطوة الخامسة: تشغيل موديل الـ ML وتحديث التوقعات
    - name: Run ML Forecasting Model
      run: python forecast_model.py